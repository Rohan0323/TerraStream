<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TerraStream | Watch Your Video</title>
    <style>
        /* Base Theme - True Dark like modern OTT platforms */
        body {
            background-color: #0a0a0a;
            color: #ffffff;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            margin: 0;
            padding: 0;
            overflow-x: hidden;
        }

        /* Top Navigation Bar - Only the brand, no fake links */
        .navbar {
            display: flex;
            align-items: center;
            background-color: #000000;
            padding: 15px 40px;
            position: sticky;
            top: 0;
            z-index: 1000;
            border-bottom: 1px solid #1a1a1a;
        }

        .brand {
            font-size: 1.8rem;
            font-weight: 800;
            letter-spacing: 1px;
        }

        /* Subtle Jio brand color only on the logo */
        .brand span {
            color: #d9008d; 
        }

        /* Video Hero Section */
        .hero-section {
            width: 100%;
            background-color: #000000;
            display: flex;
            justify-content: center;
            padding-top: 20px;
            border-bottom: 1px solid #1a1a1a;
        }

        .video-wrapper {
            width: 95%;
            max-width: 1200px;
            border-radius: 8px;
            overflow: hidden;
            background-color: #000;
        }

        video {
            width: 100%;
            height: auto;
            display: block;
        }

        /* Movie Details Section */
        .details-section {
            max-width: 1200px;
            margin: 0 auto;
            padding: 30px 5%;
        }

        .title {
            font-size: 2.2rem;
            margin: 0 0 10px 0;
            font-weight: 700;
        }

        .meta-data {
            color: #a3a3a3;
            font-size: 0.95rem;
            font-weight: 600;
            margin-bottom: 25px;
        }

        .meta-data span {
            margin-right: 15px;
        }

        /* Clean, modern white play button */
        .play-btn {
            background-color: #ffffff; 
            color: #000000;
            border: none;
            border-radius: 4px;
            padding: 12px 35px;
            font-size: 1.1rem;
            font-weight: 700;
            cursor: pointer;
            transition: background-color 0.2s, opacity 0.2s;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .play-btn:hover {
            background-color: #e6e6e6;
            opacity: 0.9;
        }

        .description {
            margin-top: 30px;
            color: #cccccc;
            line-height: 1.6;
            font-size: 1.05rem;
            max-width: 800px;
        }
    </style>
</head>
<body>

    <nav class="navbar">
        <div class="brand">Terra<span>Stream</span></div>
    </nav>

    <div class="hero-section">
        <div class="video-wrapper">
            <video controls autoplay>
                <source src="video.mp4" type="video/mp4">
                Your browser does not support the HTML5 video tag.
            </video>
        </div>
    </div>

    <div class="details-section">
        <h1 class="title">My AWS Streaming Project</h1>
        
        <div class="meta-data">
            <span>2026</span>
            <span>HD</span>
            <span>U/A 13+</span>
            <span>Tech, Cloud</span>
        </div>

        <button class="play-btn" onclick="document.querySelector('video').play()">
            ▶ Watch Now
        </button>

        <p class="description">
            This video is being streamed directly from an Amazon S3 bucket, routed through an Application Load Balancer, and served by an Auto-Scaled EC2 instance built entirely with Terraform!
        </p>
    </div>

</body>
</html>
